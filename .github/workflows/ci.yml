name: CI

on:
  push:
    branches:
      - main
      - development
      - feature/**
  pull_request:
    branches:
      - main
      - development

jobs:
  backend:
    name: Backend Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore backend
        run: dotnet restore backend/AutoPilot.Api/AutoPilot.Api.csproj

      - name: Build backend
        run: dotnet build backend/AutoPilot.Api/AutoPilot.Api.csproj --configuration Release --no-restore

      - name: Test backend
        run: dotnet test backend/AutoPilot.Api.Tests/AutoPilot.Api.Tests.csproj --configuration Release

  frontend:
    name: Frontend Lint Test Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend

      - name: Test frontend
        run: npm run test
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  docker-validate:
    name: Docker Validation
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    if: >
      (github.event_name == 'push' && (github.ref == 'refs/heads/development' || github.ref == 'refs/heads/main')) ||
      (github.event_name == 'pull_request' && github.base_ref == 'development')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker compose config
        env:
          POSTGRES_DB: ci_db
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password_123
          JWT_ISSUER: ci-issuer
          JWT_AUDIENCE: ci-audience
          JWT_SIGNING_KEY: ci_signing_key_for_local_checks_only_32
          JWT_EXPIRES_MINUTES: 60
        run: docker compose -f docker-compose.yml config

      - name: Build backend image
        run: docker build -f backend/AutoPilot.Api/Dockerfile -t autopilot-backend:ci .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t autopilot-frontend:ci .
