name: Security Scan

on:
  push:
    branches:
      - main
      - development
      - feature/**
  pull_request:
    branches:
      - main
      - development

jobs:
  dependency-scan:
    name: Filesystem and Dependency Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
          format: table

  image-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    needs: dependency-scan
    if: >
      (github.event_name == 'push' && (github.ref == 'refs/heads/development' || github.ref == 'refs/heads/main')) ||
      (github.event_name == 'pull_request' && (github.base_ref == 'development' || github.base_ref == 'main'))

    strategy:
      matrix:
        include:
          - name: backend
            dockerfile: backend/AutoPilot.Api/Dockerfile
            context: .
          - name: frontend
            dockerfile: frontend/Dockerfile
            context: .
          - name: ai-service
            dockerfile: services/ai-service/Dockerfile
            context: services/ai-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ${{ matrix.name }} image
        run: docker build -f ${{ matrix.dockerfile }} -t autopilot-${{ matrix.name }}:scan ${{ matrix.context }}

      - name: Scan ${{ matrix.name }} image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: autopilot-${{ matrix.name }}:scan
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
          format: table
