apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: autopilot
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/raviduravisara/autopilot-devops.git
    targetRevision: main
    path: k8s/base

  destination:
    server: https://kubernetes.default.svc
    namespace: autopilot

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
