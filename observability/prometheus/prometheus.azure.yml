global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Targets are reached by Container App name within the same
# Container Apps environment (ingress listens on port 80).
scrape_configs:
  - job_name: autopilot-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - autopilot-backend:80

  - job_name: autopilot-ai-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - autopilot-ai:80
