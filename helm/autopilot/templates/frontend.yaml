apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-env
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "autopilot.labels" . | nindent 4 }}
data:
  .env.development: |
    VITE_API_BASE_URL={{ .Values.frontend.apiBaseUrl }}
    VITE_AI_BASE_URL={{ .Values.frontend.aiBaseUrl }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "autopilot.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: {{ .Values.frontend.image }}
          imagePullPolicy: {{ .Values.frontend.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.port }}
          volumeMounts:
            - name: env
              mountPath: /app/.env.development
              subPath: .env.development
      volumes:
        - name: env
          configMap:
            name: frontend-env
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-nodeport
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "autopilot.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: {{ .Values.frontend.port }}
      targetPort: {{ .Values.frontend.port }}
      nodePort: {{ .Values.frontend.nodePort }}
