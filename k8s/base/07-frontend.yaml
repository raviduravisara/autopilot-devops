apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-env
  namespace: autopilot
data:
  .env.development: |
    VITE_API_BASE_URL=http://localhost:30080
    VITE_AI_BASE_URL=http://localhost:30800
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: autopilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: autopilot-frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5173
          volumeMounts:
            - name: env
              mountPath: /app/.env.development
              subPath: .env.development
      volumes:
        - name: env
          configMap:
            name: frontend-env
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-nodeport
  namespace: autopilot
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 5173
      targetPort: 5173
      nodePort: 30173
