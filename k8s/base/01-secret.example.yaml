# Template only. Do NOT put real values here or commit the real secret.
#
# Local kind cluster: create the real secret from your .env without writing a file:
#
#   kubectl create secret generic autopilot-secret -n autopilot \
#     --from-literal=POSTGRES_PASSWORD="<your-password>" \
#     --from-literal=JWT_SIGNING_KEY="<your-32char-key>" \
#     --from-literal=GRAFANA_ADMIN_PASSWORD="<your-grafana-password>"
#
# CI/CD: inject these from GitHub Secrets at deploy time.
apiVersion: v1
kind: Secret
metadata:
  name: autopilot-secret
  namespace: autopilot
type: Opaque
stringData:
  POSTGRES_PASSWORD: "replace_me"
  JWT_SIGNING_KEY: "replace_me_at_least_32_characters_long"
  GRAFANA_ADMIN_PASSWORD: "replace_me"
