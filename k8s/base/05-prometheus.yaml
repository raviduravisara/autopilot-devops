apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: autopilot
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: autopilot-backend
        static_configs:
          - targets:
              - backend:8080
        metrics_path: /metrics
      - job_name: autopilot-ai-service
        static_configs:
          - targets:
              - ai-service:8000
        metrics_path: /metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: autopilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.52.0
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: autopilot
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
