apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: autopilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: autopilot-ai-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: PROMETHEUS_URL
              value: http://prometheus:9090
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: autopilot
spec:
  selector:
    app: ai-service
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service-nodeport
  namespace: autopilot
spec:
  type: NodePort
  selector:
    app: ai-service
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30800
